<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GHH@OFFICIAL - Ultimate OS Pro v26.0 Mobile Optimized</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');

        :root {
            --primary-accent: #3b82f6;
            --glass-blur: 25px;
            --card-radius: 30px;
            --anim-curve: cubic-bezier(0.2, 0.8, 0.2, 1);
            --anim-speed: 0.6s;
            --neon-color: rgba(59, 130, 246, 0.6);
            --glass-bg: rgba(255, 255, 255, 0.45);
            --text-color: #1a1a1a;
            --bg-solid: #ffffff;
        }

        /* --- OS THEME DEFINITIONS --- */
        body.os-ios { --primary-accent: #007aff; --card-radius: 46px; --glass-blur: 50px; --neon-color: rgba(0, 122, 255, 0.7); }
        body.os-origin { --primary-accent: #6366f1; --card-radius: 34px; --glass-blur: 65px; --neon-color: rgba(99, 102, 241, 0.7); }
        body.os-samsung { --primary-accent: #0341f1; --card-radius: 42px; --glass-blur: 20px; --neon-color: rgba(3, 65, 241, 0.7); }
        body.os-gaming { 
            --primary-accent: #ff003c; --card-radius: 4px; --glass-blur: 15px; 
            --neon-color: rgba(255, 0, 60, 0.9); --glass-bg: rgba(15, 15, 15, 0.85);
            --bg-solid: #050505; --text-color: #ffffff;
        }
        body.os-nothing { 
            --primary-accent: #ffffff; --card-radius: 24px; --glass-blur: 30px; 
            --neon-color: rgba(150, 150, 150, 0.5); --glass-bg: rgba(255, 255, 255, 0.1);
            --bg-solid: #000000; --text-color: #ffffff;
        }
        body.os-miui { --primary-accent: #ff6700; --card-radius: 28px; --glass-blur: 25px; --neon-color: rgba(255, 103, 0, 0.7); }

        body.dark-mode { --glass-bg: rgba(20, 20, 20, 0.65); --text-color: #ffffff; --bg-solid: #0a0a0a; }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0; background: var(--bg-solid); color: var(--text-color);
            transition: background 0.8s ease, color 0.5s ease;
            overflow: hidden; height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Crystal Background */
        .liquid-bg { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
        .blob { position: absolute; width: 700px; height: 700px; background: var(--neon-color); filter: blur(160px); border-radius: 50%; opacity: 0.2; animation: moveBlobs 20s infinite alternate ease-in-out; }
        @keyframes moveBlobs { 0% { transform: translate(-10%, -10%) scale(1); } 100% { transform: translate(15%, 15%) scale(1.15); } }

        /* Premium Glass Component */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)) saturate(190%);
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(190%);
            border: 1.5px solid rgba(255, 255, 255, 0.4); 
            border-radius: var(--card-radius);
            box-shadow: 
                0 0 0 1px rgba(255, 255, 255, 0.1) inset,
                0 0 15px var(--neon-color),
                0 8px 32px rgba(0,0,0,0.08);
            transition: all var(--anim-speed) var(--anim-curve);
        }

        /* --- OS SPECIFIC ANIMATIONS --- */
        .anim-os { will-change: transform, opacity, filter; opacity: 0; }
        .anim-os.active { opacity: 1; }

        .os-origin .anim-os.active { animation: originFocus 0.8s var(--anim-curve) forwards; }
        @keyframes originFocus { 
            0% { filter: blur(60px); opacity: 0; transform: scale(1.1); } 
            100% { filter: blur(0px); opacity: 1; transform: scale(1); } 
        }

        .os-ios .anim-os.active { animation: iosSpring 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes iosSpring { 0% { transform: scale(0.85); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .os-gaming .anim-os.active { animation: gamingGlitch 0.4s steps(3) forwards; }
        @keyframes gamingGlitch { 0% { transform: translate(10px); opacity: 0; filter: hue-rotate(90deg); } 50% { transform: translate(-10px); opacity: 0.5; } 100% { transform: translate(0); opacity: 1; filter: hue-rotate(0); } }

        /* --- CONTROLS --- */
        .os-hub-btn { position: fixed; top: 60px; right: 16px; width: 48px; height: 48px; background: var(--primary-accent); border-radius: 50%; display: flex; items-center: center; justify-content: center; z-index: 5000; box-shadow: 0 0 20px var(--neon-color); cursor: pointer; color: white; transition: 0.3s; border: 1.5px solid rgba(255, 255, 255, 0.3); }
        .os-hub-btn:hover { transform: scale(1.1) rotate(15deg); }
        
        .top-left-controls { position: fixed; top: 60px; left: 16px; z-index: 5000; display: flex; gap: 8px; }
        .customize-btn { cursor: pointer; border: 1.5px solid rgba(255, 255, 255, 0.4); padding: 8px 14px; font-size: 9px; font-weight: 900; text-transform: uppercase; border-radius: 12px; }
        
        /* Fixed Bottom Position for Theme Toggle */
        .theme-toggle-btn { position: fixed; bottom: 24px; left: 16px; z-index: 5000; cursor: pointer; border: 1.5px solid rgba(255, 255, 255, 0.3); width: 40px; height: 40px; display: flex; items-center: center; justify-content: center; font-size: 18px; border-radius: 50%; background: var(--glass-bg); backdrop-filter: blur(10px); transition: transform 0.3s; }
        .theme-toggle-btn:active { transform: scale(0.9); }

        .status-bar { height: 44px; padding: 0 16px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 800; position: fixed; top: 0; width: 100%; z-index: 5100; background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0,0,0,0.03); color: var(--text-color); }

        .widget-clock { font-size: 64px; md:font-size: 85px; font-weight: 900; letter-spacing: -4px; color: var(--text-color); line-height: 1; margin-bottom: 5px; }

        /* Inputs & Buttons */
        .os-input { 
            background: rgba(255, 255, 255, 0.35); 
            border: 1.5px solid rgba(255, 255, 255, 0.6); 
            border-radius: 18px; 
            width: 100%; outline: none; padding: 1rem; 
            font-weight: 700; color: var(--text-color);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 10px var(--neon-color) inset;
        }
        .os-input:focus { background: #fff; box-shadow: 0 0 25px var(--neon-color); }
        .os-btn { 
            background: var(--primary-accent); color: white; border-radius: 18px; 
            font-weight: 900; transition: 0.3s; padding: 0.85rem; width: 100%; 
            text-transform: uppercase; border: 1.5px solid rgba(255, 255, 255, 0.4); 
            letter-spacing: 1px; box-shadow: 0 8px 30px var(--neon-color);
            cursor: pointer;
        }

        /* Pro Zoom Engine */
        #imageModal { position: fixed; inset: 0; z-index: 8000; background: rgba(0,0,0,0.92); display: none; justify-content: center; align-items: center; backdrop-filter: blur(60px); overflow: hidden; touch-action: none; cursor: zoom-out; }
        .close-zoom-btn { position: fixed; top: 16px; left: 16px; width: 40px; height: 40px; background: #fff; border-radius: 50%; display: flex; items-center: center; justify-content: center; font-size: 20px; cursor: pointer; z-index: 9001; color: #000; }
        .zoom-controls { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 9001; padding: 10px 20px; background: rgba(255,255,255,0.2); backdrop-filter: blur(20px); border-radius: 50px; border: 1.5px solid rgba(255, 255, 255, 0.3); }
        .zoom-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--primary-accent); color: white; display: flex; items-center: center; justify-content: center; font-size: 18px; font-weight: bold; cursor: pointer; border: 1.5px solid rgba(255, 255, 255, 0.3); }

        #zoomedImage { max-width: 90%; max-height: 80%; border-radius: var(--card-radius); border: 2px solid rgba(255,255,255,0.8); box-shadow: 0 0 100px rgba(0,0,0,0.6); cursor: grab; transition: transform 0.12s linear; }

        /* Sticky Header */
        .sticky-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
        }

        .category-chip { flex: 0 0 auto; padding: 8px 18px; background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 50px; font-size: 10px; font-weight: 900; text-transform: uppercase; cursor: pointer; color: var(--text-color); }
        .category-chip.active { background: var(--primary-accent); color: white; border-color: transparent; box-shadow: 0 0 15px var(--neon-color); }

        .gallery-item { border: 1.5px solid rgba(255, 255, 255, 0.6); background: var(--glass-bg); border-radius: calc(var(--card-radius) / 2); overflow: hidden; transition: 0.4s var(--anim-curve); cursor: pointer; }
        
        #faceIDOverlay { position: fixed; inset: 0; z-index: 9500; background: rgba(0,0,0,0.88); display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(25px); }
        .scanner-frame { width: 200px; height: 200px; border: 3px solid var(--primary-accent); border-radius: 60px; position: relative; overflow: hidden; box-shadow: 0 0 50px var(--primary-accent); }
        .scan-line { width: 100%; height: 5px; background: var(--primary-accent); position: absolute; top: 0; left: 0; box-shadow: 0 0 30px var(--primary-accent); animation: scanMove 2.2s infinite linear; }
        @keyframes scanMove { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        .view-container { position: absolute; inset: 0; overflow-y: auto; padding-top: 44px; scroll-behavior: smooth; }
        .hidden { display: none !important; }
        .home-bar { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); width: 130px; height: 5px; background: rgba(0,0,0,0.15); border-radius: 10px; z-index: 4000; }
        .modal-overlay { position: fixed; inset: 0; z-index: 7000; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; backdrop-filter: blur(25px); }
    </style>
</head>

                "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=1200",
                "https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=1200"
            ],
            People: [
                "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=1200",
                "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=1200",
                "https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=1200"
            ],
            Documents: [
                "https://images.unsplash.com/photo-1497215728101-856f4ea42174?w=1200",
                "https://images.unsplash.com/photo-1586281380349-632531db7ed4?w=1200"
            ]
        };

        const secretPics = ["https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=1200", "https://images.unsplash.com/photo-1433086566086-014a8c95a150?w=1200"];

        function updateTime() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('os-time-small').innerText = timeStr;
            const wClock = document.getElementById('os-widget-clock'); if(wClock) wClock.innerText = timeStr;
            const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            const wDate = document.getElementById('os-widget-date'); if(wDate) wDate.innerText = dateStr;
        }
        setInterval(updateTime, 1000); updateTime();

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode', isDarkMode);
            document.getElementById('themeIcon').innerText = isDarkMode ? '🌙' : '☀️';
        }

        function toggleOSMenu() { osMenu.classList.toggle('hidden'); }

        function setOS(os) {
            currentOS = os;
            document.body.className = `os-${os}` + (isDarkMode ? ' dark-mode' : '');
            const config = osConfig[os];
            if(!config) return;

            const sub = document.getElementById('osSubtitle'); if(sub) sub.innerText = config.name;
            const userIn = document.getElementById('username'); if(userIn) userIn.placeholder = config.user;
            const passIn = document.getElementById('password'); if(passIn) passIn.placeholder = config.pass;
            const lBtn = document.getElementById('loginBtn'); if(lBtn) lBtn.innerText = config.btn;
            const sText = document.getElementById('os-status-text'); if(sText) sText.innerText = config.status || 'Ultimate Pro';
            
            const activeView = [loginView, galleryView, secretView].find(v => v && !v.classList.contains('hidden'));
            if(activeView) {
                const gTitle = document.getElementById('galleryTitle');
                if(activeView === galleryView && gTitle) gTitle.innerText = config.title;
                triggerAnim(activeView);
            }
            osMenu.classList.add('hidden');
        }

        function triggerAnim(el) {
            if(!el) return;
            el.classList.remove('active');
            void el.offsetWidth;
            el.classList.add('active');
        }

        function refreshUserList() {
            if(!userListEl) return;
            userListEl.innerHTML = '';
            users.forEach(user => {
                const btn = document.createElement('div');
                btn.className = "px-3 py-1.5 glass-panel text-[8px] font-black cursor-pointer whitespace-nowrap active:scale-95";
                btn.innerText = user.u.toUpperCase();
                btn.onclick = () => { document.getElementById('username').value = user.u; };
                userListEl.appendChild(btn);
            });
        }

        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const valid = users.find(user => user.u === u && user.p === p) || (u === '' && p === '');
            if (valid) {
                loginView.classList.add('hidden');
                headerControls.classList.add('hidden');
                galleryView.classList.remove('hidden');
                themeToggle.classList.add('hidden'); // Hide theme toggle on gallery for cleaner look
                const activeU = document.getElementById('activeUserName'); if(activeU) activeU.innerText = u || 'Root';
                triggerAnim(galleryView);
                renderGrid('gallery-grid', imageLib.All);
            } else { alert("Login Details Mismatch"); }
        }

        function renderGrid(containerId, images) {
            const grid = document.getElementById(containerId);
            if(!grid) return;
            grid.innerHTML = '';
            images.forEach(url => {
                const div = document.createElement('div');
                div.className = `gallery-item aspect-square glass-panel`;
                div.innerHTML = `<img src="${url}" class="w-full h-full object-cover" onclick="openImageModal('${url}')">`;
                grid.appendChild(div);
            });
        }

        function startFaceID() {
            faceIDOverlay.style.display = 'flex';
            setTimeout(() => {
                faceIDOverlay.style.display = 'none';
                showVaultModal();
            }, 2500);
        }

        function showVaultModal() { vaultModal.style.display = 'flex'; document.getElementById('vaultPassword').focus(); }
        function hideVaultModal() { vaultModal.style.display = 'none'; document.getElementById('vaultPassword').value = ''; }

        function unlockVault() {
            const passValue = document.getElementById('vaultPassword').value;
            if(passValue === ADMIN_PW) {
                hideVaultModal();
                galleryView.classList.add('hidden');
                secretView.classList.remove('hidden');
                setTimeout(() => {
                    triggerAnim(secretView);
                    renderGrid('secret-grid', secretPics);
                }, 50);
            } else { 
                alert("MASTER KEY MISMATCH"); 
                document.getElementById('vaultPassword').value = '';
            }
        }

        function exitSecretView() { secretView.classList.add('hidden'); galleryView.classList.remove('hidden'); triggerAnim(galleryView); }
        function logout() { location.reload(); }

        function openImageModal(url) { zoomedImage.src = url; imageModal.style.display = 'flex'; resetZoom(); }
        function closeImageModal() { imageModal.style.display = 'none'; }
        function resetZoom() { scale = 1; translateX = 0; translateY = 0; updateTransform(); }
        function updateTransform() { zoomedImage.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`; }

        function applyZoomPoint(factor, clientX, clientY) {
            let newScale = Math.min(Math.max(1, scale * factor), 12);
            const rect = zoomedImage.getBoundingClientRect();
            const x = clientX - (rect.left + rect.width / 2);
            const y = clientY - (rect.top + rect.height / 2);
            const ratio = (newScale / scale) - 1;
            translateX -= x * ratio; translateY -= y * ratio;
            scale = newScale; updateTransform();
        }
        function applyZoomBtn(f) { applyZoomPoint(f, window.innerWidth / 2, window.innerHeight / 2); }

        async function downloadImage() {
            const url = zoomedImage.src;
            try {
                const res = await fetch(url);
                const blob = await res.blob();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob); a.download = "GHH_Photo.jpg";
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
            } catch (e) { alert("Download failed"); }
        }

        imageModal.addEventListener('wheel', (e) => { e.preventDefault(); applyZoomPoint(e.deltaY > 0 ? 0.85 : 1.15, e.clientX, e.clientY); }, { passive: false });
        zoomedImage.addEventListener('mousedown', (e) => { if (scale > 1) { isDragging = true; startX = e.clientX - translateX; startY = e.clientY - translateY; zoomedImage.style.transition = "none"; } });
        window.addEventListener('mousemove', (e) => { if (!isDragging) return; translateX = e.clientX - startX; translateY = e.clientY - startY; updateTransform(); });
        window.addEventListener('mouseup', () => { isDragging = false; zoomedImage.style.transition = "transform 0.12s linear"; });

        function setFilter(cat, chip) {
            document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            renderGrid('gallery-grid', imageLib[cat] || imageLib.All);
        }

        function openCustomizeModal() { customModal.classList.remove('hidden'); customModal.classList.add('flex'); }
        function closeCustomizeModal() { customModal.classList.add('hidden'); }
        
        function addUser() {
            const u = document.getElementById('newUsernameInput').value;
            const p = document.getElementById('newPasswordInput').value;
            if(u && p) {
                users.push({u, p});
                localStorage.setItem('ghh_users', JSON.stringify(users));
                refreshUserList();
                document.getElementById('newUsernameInput').value = '';
                document.getElementById('newPasswordInput').value = '';
                alert("Identity Committed");
            }
        }

        function saveSystem() {
            const h = document.getElementById('newHeadingInput').value;
            if(h) { document.getElementById('mainHeading').innerText = h; localStorage.setItem('ghh_title', h); }
            closeCustomizeModal();
        }

        window.onload = () => { 
            const savedT = localStorage.getItem('ghh_title');
            if(savedT) document.getElementById('mainHeading').innerText = savedT;
            refreshUserList();
            triggerAnim(loginView);
            renderGrid('gallery-grid', imageLib.All); 
        };
    </script>
</body>
</html>
